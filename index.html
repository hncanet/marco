<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MARCO V3.5</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body class="bg-gray-50">
<div class="max-w-[480px] mx-auto bg-white min-h-screen flex flex-col">
<button id="gps" class="bg-blue-600 text-white p-3 font-bold">📍 GPS</button>
<input id="search" class="mx-2 mt-2 p-2 bg-gray-100 rounded-xl text-sm" placeholder="Ville">
<div id="map" style="height:24vh" class="mt-2"></div>
<div class="p-2 flex justify-between text-xs border-b">
<span id="commune">...</span><button id="pause" class="px-2 bg-gray-200 rounded">⏸️</button>
</div>
<div id="view" class="flex-1 overflow-auto p-2"></div>
<div class="sticky bottom-0 bg-white p-2 flex gap-2 border-t">
<input id="q" class="flex-1 bg-gray-100 rounded-xl px-3 py-2" placeholder="Question à Marco">
<button id="ask" class="bg-black text-white px-4 rounded-xl">➤</button>
</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let lat=0,lng=0,commune='',lastList='',ph=[],i=0,sp=false;
const map=L.map('map').setView([48.85,2.35],5); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
const view=document.getElementById('view');
function speak(t){speechSynthesis.cancel();ph=t.split(/(?<=[.!?])\s+/);i=0;sp=true;next();}
function next(){if(!sp||i>=ph.length)return;const u=new SpeechSynthesisUtterance(ph[i]);u.lang='fr-FR';u.onend=()=>{i++;next();};speechSynthesis.speak(u);}
document.getElementById('pause').onclick=()=>{sp=!sp;if(!sp)speechSynthesis.cancel();else next();};

function doGPS(){
 navigator.geolocation.getCurrentPosition(async p=>{
  lat=p.coords.latitude; lng=p.coords.longitude;
  map.setView([lat,lng],17); L.marker([lat,lng]).addTo(map);
  const rev=await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}&accept-language=fr`).then(r=>r.json()).catch(()=>({}));
  commune=rev.address?.city||rev.address?.town||rev.address?.village||'Ici';
  document.getElementById('commune').textContent=commune; loadAll();
 },()=>{lat=48.8566;lng=2.3522;commune='Paris';loadAll();},{enableHighAccuracy:true,timeout:12000});
}
document.getElementById('gps').onclick=doGPS;
document.getElementById('search').onkeydown=async e=>{if(e.key==='Enter'){const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&accept-language=fr&q=${e.target.value}`).then(r=>r.json());if(r[0]){lat=+r[0].lat;lng=+r[0].lon;commune=r[0].display_name.split(',')[0];map.setView([lat,lng],14);document.getElementById('commune').textContent=commune;loadAll();}}};

async function loadAll(){
 view.innerHTML='<div class="p-4 text-center">Chargement...</div>';
 // 1. Wiki FR rapide
 const wiki=await fetch(`https://fr.wikipedia.org/w/api.php?action=query&list=geosearch&gscoord=${lat}|${lng}&gsradius=2000&gslimit=25&format=json&origin=*`).then(r=>r.json()).catch(()=>({query:{geosearch:[]}}));
 let items=wiki.query.geosearch.map(w=>({name:w.title,la:w.lat,lo:w.lon}));
 renderList(items,'Wikipedia');
 // 2. OSM en arrière-plan (ne bloque pas)
 fetch(`https://overpass-api.de/api/interpreter?data=[out:json];node(around:500,${lat},${lng})[tourism];out;`).then(r=>r.json()).then(d=>{
   d.elements.forEach(e=>{const n=e.tags['name:fr']||e.tags.name;if(n)items.push({name:n,la:e.lat,lo:e.lon});});
   renderList(items,'Mix');
 }).catch(()=>{});
}

function renderList(items,title){
 const seen=new Set();
 const html=items.filter(it=>{const k=it.name.toLowerCase();if(seen.has(k))return 0;seen.add(k);return 1;})
 .map(it=>`<div class="p-3 bg-white border rounded-lg mb-2" onclick="tell('${it.name.replace(/'/g,"\\'")}',${it.la},${it.lo})"><b>${it.name}</b></div>`).join('');
 lastList=`<h3 class="font-bold mb-2">${title} - ${seen.size} lieux</h3>${html}`;
 view.innerHTML=lastList;
}

async function tell(t,la,lo){
 view.innerHTML=`<button onclick="view.innerHTML=lastList" class="mb-2 text-blue-600">← Retour</button><div class="p-4 text-center">Chargement ${t}...</div>`;
 let d=await fetch(`https://fr.wikipedia.org/w/api.php?action=query&prop=extracts|pageimages&explaintext=1&exsentences=10&piprop=original&titles=${encodeURIComponent(t)}&format=json&origin=*`).then(r=>r.json());
 let p=Object.values(d.query.pages)[0];
 if(p.missing){const en=await fetch(`https://en.wikipedia.org/w/api.php?action=query&prop=extracts&explaintext=1&exsentences=10&titles=${encodeURIComponent(t)}&format=json&origin=*`).then(r=>r.json());p=Object.values(en.query.pages)[0];}
 const txt=p.extract||'Pas de description.'; const img=p.original?`<img src="${p.original.source}" class="w-full h-56 object-cover rounded-xl mb-3">`:'';
 view.innerHTML=`<button onclick="view.innerHTML=lastList" class="mb-2 text-blue-600">← Retour</button><div class="bg-white p-4 rounded-xl shadow"><h2 class="text-xl font-bold mb-2">${t}</h2>${img}<p class="whitespace-pre-line">${txt}</p></div>`;
 speak(t+'. '+txt); map.setView([la,lo],18); L.marker([la,lo]).addTo(map);
}
function ask(){const q=document.getElementById('q').value.trim();if(!q)return;document.getElementById('q').value='';tell(q,lat,lng);}
document.getElementById('ask').onclick=ask; document.getElementById('q').onkeydown=e=>{if(e.key==='Enter')ask();};
window.onload=()=>setTimeout(doGPS,600);
</script>
</body>
</html>
